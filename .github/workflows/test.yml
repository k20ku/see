name: Test

on:
  push:
    branches:
      - 'dev'
      - 'main'
  pull_request:

permissions:
  contests: read
  pull-request: read

jobs:
  test:
  name: Go Test
  runs-on: ubuntu-latest
  timeout-minutes: 10

  steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true
    
    - name: Download dependencies
      run: go mod Download
    
    - name: Verify modules
      run: go mod Verify
    
    - name: Run tests
      run: go test -race  -covermode=atomic -coverprofile=coverage.out ./...

    - name: Report coverage
      uses: k1LoW/octocov-action@v1