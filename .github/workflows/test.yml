on:
  push:
    branches:
      - 'milestone/CI'
      - 'dev'
      - 'main'
  pull_request:
name: test
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.25'
      - uses: actions/checkout@v6
      - run: go test ./... -coverprofile=coverage.out
      - name: report coverage
        uses: k1LoW/octocov-action@v1