services:
  app-deploy:
    image: see
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    ports:
      - "80:80"
    environment:
      SEE_ENV: deploy
      PORT: 80

  app-dev:
    image: see-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "18080:8080"
    environment:
      SEE_ENV: dev
      PORT: 8080


volumes:
  go-build-cache:
  go-mod-cache:

